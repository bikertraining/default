{% load static %}

{% load get_gui_url %}

{% load get_title %}

<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta Information -->
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <!-- Title -->
    <title>
        Login - {% get_title %}
    </title>

    <!-- Canonical -->
    <link rel="canonical"
          href="{% get_gui_url %}{{ request.get_full_path }}">

    <!-- Favicons -->
    <link rel="icon"
          href="{% static '/favicon.ico' %}"
          type="image/x-icon">

    <link rel="apple-touch-icon"
          href="{% static '/favicon.ico' %}">

    <!-- Preconnect -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link rel="preconnect"
          href="https://cdn.jsdelivr.net"
          crossorigin>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
          rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">

    <!-- Bootstrap Icons CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Bootstrap Javascript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

    <!-- Styles -->
    <style>
        @font-face {
            font-family: 'Inter';
            font-display: swap;
            src: local('sans-serif');
        }

        @font-face {
            font-family: 'bootstrap-icons';
            src: url('https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/fonts/bootstrap-icons.woff2') format('woff2'),
            url('https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/fonts/bootstrap-icons.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        h1, h2, h3, h4 {
            font-family: 'Montserrat', sans-serif;
        }

        img {
            max-inline-size: 100%;
            block-size: auto;
        }

        .accent {
            color: #F97316;
        }

        .btn-accent {
            background-color: #F97316;
            color: #FFFFFF;
        }

        .btn-accent:hover {
            background-color: #D45F12;
            color: #FFFFFF;
        }
    </style>

    <!-- Custom <style> -->
    {% block style %}
    {% endblock %}
</head>

<body>
<!-- Main Content -->
<main>
    {% block content %}
    {% endblock %}
</main>

<!-- Custom JS <script> -->
{% block script %}
{% endblock %}
</body>
</html>
